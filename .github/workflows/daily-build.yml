name: Daily Job Sync
on:
  schedule:
    - cron: '0 0 * * *'   # हर दिन रात 12 बजे UTC
  workflow_dispatch:       # मैन्युअल रन भी कर सकते हो

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update jobs [skip ci]"
          git push
